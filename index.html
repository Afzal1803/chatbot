<!DOCTYPE html><html lang="en"><head><meta http-equiv="origin-trial" content="A7vZI3v+Gz7JfuRolKNM4Aff6zaGuT7X0mf3wtoZTnKv6497cVMnhy03KDqX7kBz/q/iidW7srW31oQbBt4VhgoAAACUeyJvcmlnaW4iOiJodHRwczovL3d3dy5nb29nbGUuY29tOjQ0MyIsImZlYXR1cmUiOiJEaXNhYmxlVGhpcmRQYXJ0eVN0b3JhZ2VQYXJ0aXRpb25pbmczIiwiZXhwaXJ5IjoxNzU3OTgwODAwLCJpc1N1YmRvbWFpbiI6dHJ1ZSwiaXNUaGlyZFBhcnR5Ijp0cnVlfQ==">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>United Techno Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.min.css">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link href="../static/content/main.css" rel="stylesheet">
</head>
<body>
    <div class="">
            <!-- Chat Widget -->


        <div class="chat-body">
            <!-- Initial Bot Message -->
             <div class="d-flex align-items-center mb-3 mt-2 first_chat_message">
                <img src="/static/images/utlogo1.png" class="chat-avatar me-2" alt="Bot">
                <div>
                    <div class="bot-message">
                        Got any requirements to discuss? We're happy to help!
                    </div>
                    <small class="text-muted d-block mt-1 " id="bot-timestamp"></small>
                </div>
            </div>

            <div class="mb-3 mt-2 first_chat_form">
                <!-- <img src="/static/images/utlogo1.png" class="welcome_bot mb-3" alt="Bot">
                <p class="welcome_header">Hi there! I'm your United Techno AI Support. How can I help you today?</p> -->
                <hr style="border: 1px solid #333;width: 100%">
                <p class="text-muted mb-0 welcome_note">Please share your email and organization name to get started.</p>
                <form class="chat_form">
                    <div class="form-group mb-2">
                        <label for="userEmail">Email Address</label>
                        <input type="email" class="form-control" id="userEmail" aria-describedby="emailHelp" placeholder="Enter email address">
                    </div>
                <div class="form-group mb-3">
                    <label for="userNumber">Phone Number (optional)</label>
                    

                    <div class="form-group mb-3">
                        <label for="userCompany">Organization Name</label>
                        <input type="text" class="form-control" id="userCompany" placeholder="Enter organization name">
                    </div>
                    <div class="g-recaptcha mb-2" data-sitekey="6Lc5PXcrAAAAAP25EzyfncN4xL8a2PStr8NfKN_D" data-callback="recaptchaSuccess"></div>
                    <div class="form_actions d-flex justify-content-end">
                        <div id="form-error-msg" class="mt-1 text-center me-5" style="display: none;"></div>
                        <button type="button" class="btn btn-primary" id="detailsSubmit" disabled="">Submit</button>
                    </div>
                </form>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be appended here -->
            </div>
            
        </div>
       
        <div class="chat_input_section" hidden="">
            <div class="input-group rounded-pill border rounded-pills chat_input_section px-1 py-2 w-80" hidden="">
                <input type="text" id="chat-input" class="form-control border-0" placeholder="Write a message" style="background-color: #FFFFFF; height: 20px; font-size: 12px">
                <span class="input-group-text bg-white border-0">
                    <i class="fas fa-paper-plane me-3 disabled" id="send-btn" style="cursor: pointer; pointer-events: none; opacity: 0.5;"></i>
                </span>
            </div>
            <div class="chat_input_section" hidden="">
                <button type="button" id="end-chat-btn" class="btn btn-danger" style="border-radius: 20px; font-size: 12px;">End Chat</button>
            </div>
        </div>
        <small class="text-muted d-block mt-1 text-center">Powered By United Techno's AI Studio</small>

    </div>
    <!-- Chat Script -->
    <script type="text/javascript" async="" charset="utf-8" src="https://www.gstatic.com/recaptcha/releases/QvLuXwupqtKCyjBw2xIzFLIf/recaptcha__en.js" crossorigin="anonymous" integrity="sha384-obDEicORg1BccYuEfFig6FFh0s3Ho2B7lr6lAHLJGwZTVRSgTgfEKmrfdJ2g/NkT"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://www.google.com/recaptcha/api.js" async="" defer=""></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.2/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <script src="../static/scripts/newbot.js"></script>

</body></html>
